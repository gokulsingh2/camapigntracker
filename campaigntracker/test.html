<!DOCTYPE html>
<html>
<head>
  <title>Test - Campaign Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/campaigntracker/style.css">
</head>
<body>
  <div class="container" style="text-align: center;">
    <div class="brand-icon" style="width:44px;height:44px;font-size:14px;margin: 0 auto 24px;">CT</div>
    <h2>Test Conversion Email</h2>
    <p style="color: var(--text-secondary); font-size: 14px; margin-top: -16px; margin-bottom: 24px;">Click the button to send a test conversion notification</p>
    <button onclick="testConversion()" style="width: auto; padding: 14px 28px;">🎉 Send Test Conversion</button>
    <div id="msg" style="margin-top: 20px; font-size: 14px;"></div>
  </div>
  <script>
    const API = "https://web-production-ef9b1.up.railway.app";
    const token = localStorage.getItem("token");

    if (!token) {
      window.location = "/campaigntracker/login.html";
    }

    function testConversion() {
      const msg = document.getElementById("msg");
      msg.style.color = "#94a3b8";
      msg.textContent = "Sending test conversion...";

      fetch(API + "/track/conversion", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
          campaign_id: 1,
          type: "Purchase",
          revenue: 999
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.message === "Conversion tracked") {
          msg.style.color = "#10b981";
          msg.textContent = "✅ Conversion tracked! Check your email inbox now!";
        } else {
          msg.style.color = "#ef4444";
          msg.textContent = "❌ Error: " + data.message;
        }
      })
      .catch(() => {
        msg.style.color = "#ef4444";
        msg.textContent = "❌ Something went wrong!";
      });
    }
  </script>
</body>
</html>
