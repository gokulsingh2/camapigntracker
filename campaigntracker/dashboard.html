<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - Campaign Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/campaigntracker/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Mobile menu button -->
  <button class="menu-btn" onclick="toggleSidebar()" id="menuBtn">&#9776;</button>

  <!-- Overlay for mobile -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <div class="dashboard">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-brand" onclick="loadWelcome(); closeSidebar();" style="cursor:pointer;">
        <div class="brand-icon">CT</div>
        <h2>Tracker</h2>
      </div>
      <ul>
        <li onclick="loadPage('profile'); closeSidebar();">
          <span class="nav-icon">&#128100;</span> Profile
        </li>
        <li onclick="loadPage('create'); closeSidebar();">
          <span class="nav-icon">+</span> Create Campaign
        </li>
        <li onclick="loadPage('analytics'); closeSidebar();">
          <span class="nav-icon">&#9998;</span> Analytics
        </li>
        <li onclick="loadPage('campaigns'); closeSidebar();">
          <span class="nav-icon">&#9776;</span> My Campaigns
        </li>
        <li class="logout-btn" onclick="logout()">
          <span class="nav-icon">&#8594;</span> Logout
        </li>
      </ul>
    </div>

    <div class="main" id="mainContent">
      <div class="welcome-screen">
        <div class="welcome-badge">Campaign Tracker</div>
        <h1 class="welcome-title">Welcome!</h1>
        <p class="welcome-subtitle">Manage and track your marketing campaigns from one place.</p>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon">&#128196;</div>
            <div class="stat-info">
              <div class="stat-number">0</div>
              <div class="stat-label">Campaigns</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">&#9654;</div>
            <div class="stat-info">
              <div class="stat-number">0</div>
              <div class="stat-label">Total Clicks</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">&#10003;</div>
            <div class="stat-info">
              <div class="stat-number">0</div>
              <div class="stat-label">Conversions</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">&#8377;</div>
            <div class="stat-info">
              <div class="stat-number">0</div>
              <div class="stat-label">Revenue</div>
            </div>
          </div>
        </div>
        <button onclick="loadPage('create')" class="cta-btn">+ Create New Campaign</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="/campaigntracker/script.js"></script>
  <script>
    function toggleSidebar() {
      document.getElementById("sidebar").classList.toggle("open");
      document.getElementById("sidebarOverlay").classList.toggle("active");
    }
    function closeSidebar() {
      document.getElementById("sidebar").classList.remove("open");
      document.getElementById("sidebarOverlay").classList.remove("active");
    }
    loadWelcome();
  </script>
</body>
</html>
